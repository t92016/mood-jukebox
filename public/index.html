<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>心情點唱機 🎵</title>
  <meta name="description" content="告訴點唱機你現在的心情，讓它為你點一首歌！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">

    <header class="hero">
      <h1>🎵 心情點唱機</h1>
      <p class="subtitle">告訴我你現在的心情，我來幫你點一首歌！</p>
    </header>

    <section class="mood-panel" aria-label="選擇心情">
      <div class="mood-buttons" id="moodButtons">
        <button class="mood-btn" data-mood="開心" type="button">😊<span>開心</span></button>
        <button class="mood-btn" data-mood="難過" type="button">😢<span>難過</span></button>
        <button class="mood-btn" data-mood="生氣" type="button">😤<span>生氣</span></button>
        <button class="mood-btn" data-mood="想睡" type="button">😴<span>想睡</span></button>
        <button class="mood-btn" data-mood="緊張" type="button">😖<span>緊張</span></button>
        <button class="mood-btn" data-mood="無聊" type="button">😐<span>無聊</span></button>
      </div>

      <form id="moodForm" class="mood-form">
        <input id="moodInput" type="text" maxlength="200"
               placeholder="或是……自己說說現在的心情？"
               autocomplete="off" aria-label="輸入心情">
        <button type="submit" id="submitBtn">點歌 🎶</button>
      </form>
    </section>

    <section id="statusArea" class="status-area" hidden aria-live="polite">
      <div class="spinner"></div>
      <p id="statusText"></p>
    </section>

    <section id="resultArea" class="result-area" hidden>
      <div class="song-card">
        <div class="song-info">
          <p class="card-label" id="resultLabel">🎁 為你點播</p>
          <h2 id="songTitle"></h2>
          <p id="songArtist" class="artist"></p>
          <p id="songReason" class="reason"></p>
        </div>
        <!-- 歌手瀏覽模式：歌曲下拉選單 -->
        <div id="browseWrap" class="browse-wrap" hidden>
          <p class="browse-hint">🎹 選一首想聽的歌吧！</p>
          <select id="songSelect" class="song-select" aria-label="選擇歌曲">
            <option value="" disabled selected>— 請選擇歌曲 —</option>
          </select>
          <button id="playSelectedBtn" class="play-selected-btn" type="button" disabled>播放選擇的歌曲 ▶</button>
        </div>
        <!-- 播放控制列 -->
        <div class="controls-bar" id="controlsBar">
          <button id="btnPrev" class="ctrl-btn" type="button" title="上一首" disabled>⏮</button>
          <button id="btnPlayPause" class="ctrl-btn" type="button" title="播放/暫停" disabled>▶</button>
          <button id="btnNext" class="ctrl-btn" type="button" title="下一首" disabled>⏭</button>
          <button id="btnRandom" class="ctrl-btn random-btn" type="button" title="隨機播放">🔀</button>
          <div class="volume-wrap">
            <span class="volume-icon">🔊</span>
            <input id="volumeSlider" class="volume-slider" type="range" min="0" max="100" value="80" title="音量">
          </div>
        </div>
        <div class="player-wrap">
          <div id="player"></div>
        </div>
        <!-- 歌詞顯示 -->
        <div id="lyricsWrap" class="lyrics-wrap" hidden>
          <div class="lyrics-header" id="lyricsHeader">
            <span class="lyrics-label">🎤 歌詞</span>
            <button id="btnToggleLyrics" class="toggle-lyrics-btn" type="button">展開 ▼</button>
          </div>
          <div id="lyricsContent" class="lyrics-content collapsed">
            <p id="lyricsText" class="lyrics-text">暫無歌詞，靜心聆聽音樂吧～ 🎵</p>
          </div>
        </div>
      </div>
    </section>

    <section class="wall" aria-label="心情點唱牆">
      <h2>🌸 心情點唱牆</h2>
      <p class="wall-hint">看看大家最近點了什麼歌</p>
      <ul id="wallList" class="wall-list"></ul>
    </section>

    <footer class="footer">
      <p>用音樂陪伴每一種心情 ☁️</p>
    </footer>

  </main>

  <script>
    // YouTube IFrame API 回調佔位符：必須在 youtube.com/iframe_api 載入前定義
    window.onYouTubeIframeAPIReady = function () {
      window.ytApiReady = true;
      if (typeof window._onYtReady === 'function') {
        window._onYtReady();
      }
    };
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
